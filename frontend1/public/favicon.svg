<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sunGradientFav" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB300;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#F57C00;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="templeGradientFav" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D84315;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B71C1C;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="auraGradientFav" cx="50%" cy="30%">
      <stop offset="0%" style="stop-color:#FFB300;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#F57C00;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" fill="#ffffff" rx="8"/>

  <!-- Spiritual aura -->
  <circle cx="32" cy="32" r="30" fill="url(#auraGradientFav)" />

  <!-- Rising sun rays - simplified for small size -->
  <g opacity="0.7">
    <line x1="32" y1="8" x2="32" y2="4" stroke="#FFB300" stroke-width="2" stroke-linecap="round"/>
    <line x1="46" y1="12" x2="50" y2="8" stroke="#FFB300" stroke-width="2" stroke-linecap="round"/>
    <line x1="52" y1="26" x2="58" y2="24" stroke="#FFB300" stroke-width="2" stroke-linecap="round"/>
    <line x1="18" y1="12" x2="14" y2="8" stroke="#FFB300" stroke-width="2" stroke-linecap="round"/>
    <line x1="12" y1="26" x2="6" y2="24" stroke="#FFB300" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Sun circle -->
  <circle cx="32" cy="20" r="8" fill="url(#sunGradientFav)" stroke="#FFB300" stroke-width="2"/>

  <!-- Ganga river waves -->
  <path d="M 8 48 Q 16 46 24 48 T 40 48 T 56 48" stroke="#1565C0" stroke-width="2" fill="none" opacity="0.6"/>

  <!-- Temple structure - simplified -->
  <rect x="22" y="32" width="20" height="16" fill="url(#templeGradientFav)" rx="1"/>
  <path d="M 20 32 L 32 26 L 44 32 Z" fill="url(#templeGradientFav)"/>
  <path d="M 24 26 L 32 22 L 40 26 Z" fill="url(#templeGradientFav)"/>

  <!-- Temple kalash -->
  <circle cx="32" cy="22" r="2" fill="#FFB300"/>
  <rect x="31" y="19" width="2" height="3" fill="#FFB300"/>

  <!-- Om symbol - simplified -->
  <path d="M 30 38 Q 30 36.5 32 36.5 Q 34 36.5 34 38 M 32 36.5 L 32 34.5"
        stroke="#ffffff" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.9"/>

  <!-- Temple door -->
  <rect x="30" y="40" width="4" height="7" fill="#FFB300" opacity="0.4" rx="0.5"/>
</svg>